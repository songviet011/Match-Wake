<style>
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(208, 188, 255, 0.4)); }
            50% { filter: drop-shadow(0 0 25px rgba(208, 188, 255, 0.8)); }
        }
        @keyframes bolt-strike {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            50% { opacity: 1; transform: scale(1.1) rotate(5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-pulse-glow { animation: pulse-glow 3s infinite ease-in-out; }
        .animate-bolt { animation: bolt-strike 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-float { animation: float 4s infinite ease-in-out; }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);

<!-- Micro-interaction Script -->
<script>
        document.getElementById('readyButton').addEventListener('click', function() {
            // Success Haptic Feedback Simulation
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
            this.classList.add('opacity-80');
            
            setTimeout(() => {
                const confettiCount = 20;
                for (let i = 0; i < confettiCount; i++) {
                    createConfetti();
                }
                this.innerHTML = 'Tuyệt vời! <span class="material-symbols-outlined">check_circle</span>';
                this.classList.replace('from-primary', 'from-secondary');
                this.classList.replace('to-primary-container', 'to-secondary-container');
                this.classList.replace('text-on-primary-container', 'text-on-secondary-container');
            }, 800);
        });

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.width = '8px';
            confetti.style.height = '8px';
            confetti.style.backgroundColor = Math.random() > 0.5 ? '#d0bcff' : '#4cd7f6';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.bottom = '0';
            confetti.style.zIndex = '100';
            confetti.style.borderRadius = '50%';
            document.body.appendChild(confetti);

            const animation = confetti.animate([
                { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                { transform: `translateY(-${Math.random() * 100 + 50}vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], {
                duration: Math.random() * 1000 + 1000,
                easing: 'cubic-bezier(0, .9, .57, 1)'
            });

            animation.onfinish = () => confetti.remove();
        }
    </script>
