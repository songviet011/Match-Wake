<!-- Interactive Background Script -->
<script>
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.1,
                    opacity: Math.random()
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                ctx.fillStyle = `rgba(208, 188, 255, ${star.opacity})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                
                star.y -= star.speed;
                if (star.y < 0) star.y = height;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();

        // Simulate a transition to main app (visual only)
        document.querySelector('button').addEventListener('click', () => {
            document.body.classList.add('transition-all', 'duration-1000', 'scale-110', 'opacity-0');
            setTimeout(() => {
                alert('Chế độ demo: Đang chuyển hướng đến màn hình Ghép đôi...');
                location.reload();
            }, 1000);
        });
    </script>
