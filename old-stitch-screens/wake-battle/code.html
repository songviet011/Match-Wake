<body class="bg-background text-on-background min-h-screen flex flex-col">

<main class="flex-1 px-6 pb-32">
<!-- Battle Status Hero -->

<div class="glass-card rounded-lg p-6 relative overflow-hidden">
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/20 blur-3xl rounded-full"></div>
<div class="flex justify-between items-center relative z-10">
<div class="flex flex-col">
<span class="text-secondary font-label-bold text-label-bold uppercase tracking-wider mb-1">Đang đối đầu</span>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Minh Anh</h2>
</div>
<div class="text-right">
<div class="flex items-center gap-2 justify-end mb-1">
<span class="w-3 h-3 bg-error rounded-full animate-pulse"></span>
<span class="text-error font-label-bold text-label-bold">Chưa dậy!</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">4:52 còn lại</p>
</div>
</div>
<div class="mt-6 flex items-center gap-4">
<div class="flex-1 h-3 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-secondary w-[65%] rounded-full shadow-[0_0_15px_rgba(208,188,255,0.5)]"></div>
</div>
<span class="font-label-bold text-label-bold text-primary">65%</span>
</div>
</div>
</section>
<!-- Call to Action Text -->
<div class="mb-6">
<h3 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">Gửi meme để gọi đối tác! 🔊</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Âm thanh sẽ phát trực tiếp trên điện thoại đối thủ.</p>
</div>
<!-- Meme Bento Grid -->
<div class="grid grid-cols-2 md:grid-cols-3 gap-4">
<!-- Card 1 -->
<button class="meme-card glass-card rounded-lg p-4 flex flex-col items-center text-center transition-all duration-300 hover:border-primary group" onclick="sendMeme('Dậy đi ông cháu ơi')">
<div class="w-20 h-20 mb-3 rounded-xl bg-primary-container/20 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[40px] text-primary" data-icon="campaign">campaign</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface mb-4">Dậy đi ông cháu ơi</span>
<div class="mt-auto w-full py-2 bg-primary rounded-full text-on-primary font-label-bold text-label-bold shadow-lg shadow-primary/20">GỬI</div>
</button>
<!-- Card 2 -->
<button class="meme-card glass-card rounded-lg p-4 flex flex-col items-center text-center transition-all duration-300 hover:border-secondary group" onclick="sendMeme('Opera Scream')">
<div class="w-20 h-20 mb-3 rounded-xl bg-secondary-container/20 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[40px] text-secondary" data-icon="record_voice_over">record_voice_over</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface mb-4">Opera Scream</span>
<div class="mt-auto w-full py-2 bg-secondary rounded-full text-on-secondary font-label-bold text-label-bold shadow-lg shadow-secondary/20">GỬI</div>
</button>
<!-- Card 3 -->
<button class="meme-card glass-card rounded-lg p-4 flex flex-col items-center text-center transition-all duration-300 hover:border-error group" onclick="sendMeme('Còi báo động')">
<div class="w-20 h-20 mb-3 rounded-xl bg-error-container/20 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[40px] text-error" data-icon="emergency_home">emergency_home</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface mb-4">Còi báo động</span>
<div class="mt-auto w-full py-2 bg-error rounded-full text-on-error font-label-bold text-label-bold shadow-lg shadow-error/20">GỬI</div>
</button>
<!-- Card 4 -->
<button class="meme-card glass-card rounded-lg p-4 flex flex-col items-center text-center transition-all duration-300 hover:border-tertiary group" onclick="sendMeme('Gà gáy banh nóc')">
<div class="w-20 h-20 mb-3 rounded-xl bg-tertiary-container/20 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[40px] text-tertiary" data-icon="notification_important">notification_important</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface mb-4">Gà gáy banh nóc</span>
<div class="mt-auto w-full py-2 bg-tertiary rounded-full text-on-tertiary font-label-bold text-label-bold shadow-lg shadow-tertiary/20">GỬI</div>
</button>
<!-- Card 5 (Large Visual) -->
<div class="col-span-2 glass-card rounded-lg p-4 relative overflow-hidden flex items-center justify-between group">
<div class="relative z-10 w-2/3">
<span class="text-primary font-label-bold text-label-bold uppercase">Meme của tháng</span>
<h4 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface leading-tight mt-1">Siuuuu Ronaldo</h4>
<button class="mt-4 px-6 py-2 bg-gradient-to-r from-primary to-secondary rounded-full font-label-bold text-label-bold active:scale-95 transition-all" onclick="sendMeme('Siuuuu')">GỬI NGAY</button>
</div>
<div class="absolute right-0 top-0 h-full w-1/3 overflow-hidden opacity-40 group-hover:opacity-100 transition-opacity">
<img alt="Stadium atmosphere" class="w-full h-full object-cover" data-alt="A vibrant, high-energy football stadium atmosphere at night. The stadium is packed with fans, and powerful floodlights create long dramatic shadows and light flares. The grass is an intense, saturated green. Wisps of celebratory smoke or fog drift across the pitch under the neon blue and purple stage lights of the stadium. Digital art style, dynamic and exciting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCLvk8H6CSf_GbyFA9TcjXkG0geHCABB_HztROHR4YMJtUpQTxTgfW8pWZ2VnyfWtv3GMjzLVl1XVDnIyk60thZHTRyDihRJuJG7loJ_WC0L-_vJ99d3YEW0rISApR4b80XiE36KVmlu4i1r8DFZq3-RLdJSr4a_DUu9hJrjcC8Ek778GDMWfvI-c3Owrt7bvKlITLGbN1UnKnjp6ng9_f_mlPCs55XBZbRMg5gS_GLyBNNyO30kP1jd7GtffZF1SZMc6DGIp1ZuZY"/>
</div>
</div>
<!-- Card 6 -->
<button class="meme-card glass-card rounded-lg p-4 flex flex-col items-center text-center transition-all duration-300 hover:border-primary-fixed group" onclick="sendMeme('Hơi thở anime')">
<div class="w-20 h-20 mb-3 rounded-xl bg-primary-fixed/20 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[40px] text-primary-fixed" data-icon="bolt">bolt</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface mb-4">Hơi thở anime</span>
<div class="mt-auto w-full py-2 bg-primary-fixed-dim rounded-full text-on-primary-fixed-variant font-label-bold text-label-bold shadow-lg">GỬI</div>
</button>
<!-- Card 7 -->
<button class="meme-card glass-card rounded-lg p-4 flex flex-col items-center text-center transition-all duration-300 hover:border-outline group" onclick="sendMeme('Tiếng khoan tường')">
<div class="w-20 h-20 mb-3 rounded-xl bg-outline-variant/20 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[40px] text-outline" data-icon="construction">construction</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface mb-4">Tiếng khoan tường</span>
<div class="mt-auto w-full py-2 bg-outline rounded-full text-on-surface-variant font-label-bold text-label-bold shadow-lg">GỬI</div>
</button>

</main>
<!-- Chat-like Interface Bottom Bar -->
<div class="fixed bottom-0 left-0 w-full z-50 p-6 bg-background/80 backdrop-blur-2xl">
<div class="max-w-screen-xl mx-auto flex items-center gap-3">
<button class="w-12 h-12 flex-shrink-0 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant active:scale-90 transition-all">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<div class="flex-1 glass-card rounded-full flex items-center px-4 py-1 h-12 border-white/10">
<input class="w-full bg-transparent border-none focus:ring-0 text-body-md text-on-surface placeholder:text-on-surface-variant/50" id="chatInput" placeholder="Nói gì đó khích lệ..." type="text"/>
<button class="p-1 text-primary-container hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="sentiment_very_satisfied">sentiment_very_satisfied</span>
</button>
</div>
<button class="w-12 h-12 flex-shrink-0 flex items-center justify-center rounded-full bg-primary text-on-primary shadow-[0_0_20px_rgba(208,188,255,0.4)] active:scale-90 transition-all" id="sendBtn">
<span class="material-symbols-outlined" data-icon="send">send</span>
</button>
</div>
</div>
<!-- Notification Toast (Hidden by default) -->
<div class="fixed top-24 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full bg-secondary-container text-on-secondary-container font-label-bold text-label-bold shadow-2xl opacity-0 transition-all duration-300 translate-y-[-20px] pointer-events-none" id="toast">
        Meme đã được gửi thành công! 🚀
    </div>
<script>
        function sendMeme(name) {
            const toast = document.getElementById('toast');
            toast.textContent = `Đã gửi "${name}" thành công! 🚀`;
            toast.classList.remove('opacity-0', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            // Interaction effect
            const btn = event.currentTarget.querySelector('div:last-child');
            btn.textContent = "ĐÃ GỬI!";
            btn.classList.replace('bg-primary', 'bg-on-secondary-fixed-variant');
            btn.classList.replace('bg-secondary', 'bg-on-secondary-fixed-variant');
            btn.classList.replace('bg-error', 'bg-on-secondary-fixed-variant');
            btn.classList.replace('bg-tertiary', 'bg-on-secondary-fixed-variant');

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2000);
        }

        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        sendBtn.addEventListener('click', () => {
            if (chatInput.value.trim() !== "") {
                sendMeme("Tin nhắn");
                chatInput.value = "";
            }
        });

        // Add "squishy" feel to all buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.style.transform = 'scale(0.92)');
            btn.addEventListener('mouseup', () => btn.style.transform = 'scale(1)');
            btn.addEventListener('mouseleave', () => btn.style.transform = 'scale(1)');
        });
    </script>
</body></html>
