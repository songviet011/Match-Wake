<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            overflow: hidden;
            background-color: #0d112c;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: theme('colors.primary');
            opacity: 0;
            animation: pulse 3s infinite;
        }
        .pulse-ring:nth-child(2) { animation-delay: 1s; }
        .pulse-ring:nth-child(3) { animation-delay: 2s; }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .floating-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            filter: blur(1px);
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .orb-gradient {
            background: radial-gradient(circle, theme('colors.primary-container') 0%, transparent 70%);
            filter: blur(40px);
            opacity: 0.4;
        }

        .primary-dawn {
            background: linear-gradient(135deg, #a078ff 0%, #4cd7f6 100%);
        }
    </style>

</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-on-surface transition-colors hover:bg-white/5 active:scale-95 transition-transform duration-150 ease-out">

<script>
        // Generate Floating Stars
        const starField = document.getElementById('star-field');
        const starCount = 50;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'floating-star';
            
            const size = Math.random() * 3 + 1;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const duration = Math.random() * 3 + 2;
            const delay = Math.random() * 5;

            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${x}%`;
            star.style.top = `${y}%`;
            star.style.setProperty('--duration', `${duration}s`);
            star.style.animationDelay = `${delay}s`;

            starField.appendChild(star);
        }

        // Random Dynamic Message Rotation
        const messages = [
            "Đừng ngủ nướng nhé, ai đó đang đợi bạn!",
            "Một người bạn mới đang tìm kiếm bạn...",
            "Dậy sớm để thành công và kết nối!",
            "Chỉ còn một chút nữa thôi, kiên nhẫn nhé!",
            "Chuẩn bị năng lượng cho ngày mới nào!"
        ];
        
        let messageIndex = 0;
        const messageEl = document.querySelector('p.font-body-md');
        
        setInterval(() => {
            messageEl.style.opacity = 0;
            setTimeout(() => {
                messageIndex = (messageIndex + 1) % messages.length;
                messageEl.innerText = messages[messageIndex];
                messageEl.style.opacity = 1;
            }, 500);
        }, 5000);
    </script>
</body></html>
